onAuthStateChanged(auth,async u=>{
  $('ld').style.display='none';
  if(u){
    CU=u;
    try{const s=await getDoc(doc(db,'users',u.uid));CUD=s.exists()?s.data():{name:u.email,role:'supervisor'};}
    catch(e){CUD={name:u.email,role:'supervisor'};}
    $('ls').style.display='none';$('ma').style.display='block';
    $('tu').textContent=(CUD.name||u.email)+' | '+(CUD.role==='admin'?T.roleadm:T.rolesup);
    if(CUD.role==='admin'){$('anb').style.display='flex';}
    initForm();startL();SS('online');
  }else{
    CU=null;CUD=null;
    $('ls').style.display='block';$('ma').style.display='none';
    if(UNS){UNS();UNS=null;}
  }
});

window.doLogin=async()=>{
  const e=$('le').value.trim(),p=$('lp2').value.trim();
  if(!e||!p){showLA(T.ll1+' & '+T.ll2);return;}
  $('lb').disabled=true;$('lbt').textContent='...';
  try{await signInWithEmailAndPassword(auth,e,p);}
  catch(er){
    const m={'auth/user-not-found':T.loginwrong,'auth/wrong-password':T.loginwrong,'auth/invalid-credential':T.loginwrong,'auth/invalid-email':T.loginwrong};
    showLA(m[er.code]||T.loginerr);
    $('lb').disabled=false;$('lbt').textContent=T.lbt;
  }
};
window.doLogout=()=>signOut(auth);
function showLA(m){$('la').style.display='block';$('la').textContent=m;}

function startL(){
  SS('sy');
  const q=query(collection(db,'visits'),orderBy('createdAt','desc'));
  UNS=onSnapshot(q,s=>{
    AV=s.docs.map(d=>({id:d.id,...d.data()}));
    renderDB();SS('online');
    const a=document.querySelector('.sc.ac');
    if(a?.id==='sv')renderVisits();
    if(a?.id==='san')renderAnalytics();
  },()=>SS('off'));
}

window.goTo=(id,el)=>{
  document.querySelectorAll('.sc').forEach(s=>s.classList.remove('ac'));
  $(id).classList.add('ac');
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('ac'));
  if(el)el.classList.add('ac');
};
window.swTab=(id,el)=>{
  ['tall','tsingle'].forEach(t=>$(t).style.display='none');
  $(id).style.display='block';
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('ac'));
  el.classList.add('ac');
};

function initForm(){
  ANS={};ITEMS.forEach(it=>ANS[it[0]]=null);
  const now=new Date();
  $('fTime').value=now.toTimeString().slice(0,5);
  $('fDateM').value=now.toISOString().slice(0,10);
  $('it1').innerHTML=ITEMS.slice(0,21).map(bR).join('');
  $('it2').innerHTML=ITEMS.slice(21).map(bR).join('');
  updP();
}
function bR(it){
  return`<div class="ir" id="r${it[0]}"><div class="in">${it[0]}</div><div class="it">${it[1]}</div><div class="yn"><button class="yb y" onclick="setA(${it[0]},'yes',this)">${T.yes}</button><button class="yb n" onclick="setA(${it[0]},'no',this)">${T.no}</button></div></div>`;
}
window.setA=(id,v,btn)=>{
  ANS[id]=v;
  const r=$('r'+id);
  r.querySelectorAll('.yb').forEach(b=>b.classList.remove('s'));
  btn.classList.add('s');
  r.className='ir '+(v==='yes'?'ay':'an');
  updP();
};
function updP(){
  const y=Object.values(ANS).filter(v=>v==='yes').length;
  const n=Object.values(ANS).filter(v=>v==='no').length;
  const t=y+n,p=Math.round((t/41)*100);
  $('ansc').textContent=t+' / 41';$('ansp').textContent=p+'%';
  $('ansb').style.width=p+'%';$('yc').textContent=y;$('nc').textContent=n;$('nac').textContent=41-t;
}

window.addPhotos=inp=>{
  Array.from(inp.files).forEach(f=>{
    const r=new FileReader();
    r.onload=e=>{PH.push(e.target.result);rendPH();};
    r.readAsDataURL(f);
  });
  inp.value='';
};
function rendPH(){
  $('phrow').innerHTML=PH.map((d,i)=>`<div class="pt"><img src="${d}"><button class="pd" onclick="rmPH(${i})">x</button></div>`).join('');
}
window.rmPH=i=>{PH.splice(i,1);rendPH();};

window.submitVisit=async()=>{
  const h=$('fHousing').value.trim(),sup=$('fSup').value.trim();
  if(!h){showFA(T.needhouse,'al-r');return;}
  if(!sup){showFA(T.needsup,'al-r');return;}
  $('sub').disabled=true;$('subt').textContent=T.saving;
  const y=Object.values(ANS).filter(v=>v==='yes').length;
  const n=Object.values(ANS).filter(v=>v==='no').length;
  const sc=Math.round((y/41)*100);
  let pU=[];
  for(let i=0;i<PH.length;i++){
    try{const bl=dUB(PH[i]),r=ref(storage,`v/${Date.now()}_${i}.jpg`);await uploadBytes(r,bl);pU.push(await getDownloadURL(r));}
    catch(e){pU.push(PH[i]);}
  }
  try{
    await addDoc(collection(db,'visits'),{
      housing:h,day:$('fDay').value,dateH:$('fDateH').value,dateM:$('fDateM').value,
      time:$('fTime').value,location:$('fLocation').value,permit:$('fPermit').value,
      elec:$('fElec').value,nationality:$('fNationality').value,owner:$('fOwner').value,
      supervisor:sup,manager:$('fMgr').value,pilgrimNote:$('fPN').value,otherNote:$('fON').value,
      answers:{...ANS},photos:pU,score:sc,yesCount:y,noCount:n,
      createdBy:CU.uid,createdByName:CUD.name||CU.email,createdAt:serverTimestamp()
    });
    showFA(T.savok+' '+sc+'%','al-g');PH=[];setTimeout(()=>clearForm(),2000);
  }catch(e){showFA(T.saverr+e.message,'al-r');}
  $('sub').disabled=false;$('subt').textContent=T.subt;
};

function dUB(d){const a=d.split(','),m=a[0].match(/:(.*?);/)[1],b=atob(a[1]);let n=b.length;const u=new Uint8Array(n);while(n--)u[n]=b.charCodeAt(n);return new Blob([u],{type:m});}
function showFA(m,c){const el=$('fa');el.className='al '+c;el.textContent=m;el.style.display='block';setTimeout(()=>el.style.display='none',4000);}
window.clearForm=()=>{
  ['fHousing','fDay','fDateH','fDateM','fTime','fPermit','fLocation','fNationality','fElec','fOwner','fSup','fMgr','fPN','fON'].forEach(id=>{const e=$(id);if(e)e.value='';});
  PH=[];$('phrow').innerHTML='';$('fa').style.display='none';initForm();
};

function renderDB(){
  const v=AV,hs=new Set(v.map(x=>x.housing));
  const av=v.length?Math.round(v.reduce((s,x)=>s+x.score,0)/v.length):0;
  $('s1').textContent=v.length;$('s2').textContent=hs.size;
  $('s3').textContent=v.length?av+'%':'-';$('s4').textContent=v.filter(x=>x.score<60).length;
  if(!v.length){
    $('hiss').innerHTML='<div class="es"><div class="ei">📋</div>'+T.nodata+'</div>';
    $('hrec').innerHTML='<div class="es"><div class="ei">📝</div>'+T.novisits+'</div>';return;
  }
  const st=ITEMS.map(it=>{
    const y=v.filter(x=>x.answers[it[0]]==='yes').length,t=v.filter(x=>x.answers[it[0]]!=null).length;
    return{id:it[0],txt:it[1],pct:t>0?Math.round((y/t)*100):null};
  }).filter(x=>x.pct!==null).sort((a,b)=>a.pct-b.pct).slice(0,6);
  $('hiss').innerHTML=st.map(it=>`<div class="pw"><div class="pl"><span>${it.id}. ${it.txt.slice(0,30)}${it.txt.length>30?'...':''}</span><span>${it.pct}%</span></div><div class="pb"><div class="pf ${it.pct>=80?'g':it.pct>=60?'o':'r'}" style="width:${it.pct}%"></div></div></div>`).join('');
  $('hrec').innerHTML=v.slice(0,4).map(vC).join('');
}

function vC(v){
  return`<div class="vi ${VC(v.score)}" onclick="showDet('${v.id}')"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px"><div><div class="vn">${v.housing}</div><div class="vm">${v.dateM||''} ${v.time||''} | ${v.supervisor}</div></div><div class="vs ${SC(v.score)}">${v.score}%</div></div><span class="bg ${BC(v.score)}">${BL(v.score)}</span><span style="font-size:11px;color:var(--graym);margin-right:8px">✅${v.yesCount} ❌${v.noCount}</span></div>`;
}

window.renderVisits=()=>{
  let v=[...AV];
  const s=$('srch').value.toLowerCase(),sf=$('fsco').value,sup=$('fsup').value;
  if(s)v=v.filter(x=>x.housing.toLowerCase().includes(s)||x.supervisor.toLowerCase().includes(s));
  if(sf==='high')v=v.filter(x=>x.score>=80);
  else if(sf==='mid')v=v.filter(x=>x.score>=60&&x.score<80);
  else if(sf==='low')v=v.filter(x=>x.score<60);
  if(sup)v=v.filter(x=>x.supervisor===sup);
  const sups=[...new Set(AV.map(x=>x.supervisor))],sel=$('fsup'),cur=sel.value;
  sel.innerHTML='<option value="">'+T.allsup+'</option>'+sups.map(s=>`<option value="${s}" ${s===cur?'selected':''}>${s}</option>`).join('');
  $('vlist').innerHTML=v.length?v.map(vC).join(''):'<div class="es"><div class="ei">🔍</div>'+T.novisits+'</div>';
};
window.filterVisits=()=>renderVisits();

window.renderAnalytics=()=>{
  const v=AV;if(!v.length)return;
  const mp={};v.forEach(x=>{if(!mp[x.housing])mp[x.housing]={n:x.housing,s:[],c:0};mp[x.housing].s.push(x.score);mp[x.housing].c++;});
  const rk=Object.values(mp).map(h=>({...h,a:Math.round(h.s.reduce((a,b)=>a+b,0)/h.s.length)})).sort((a,b)=>b.a-a.a);
  const md=['🥇','🥈','🥉'];
  $('hrnk').innerHTML=rk.map((h,i)=>`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:10px;background:var(--grayl);border-radius:8px"><div style="font-size:20px;width:28px;text-align:center">${md[i]||'#'+(i+1)}</div><div style="flex:1"><div style="font-size:13px;font-weight:700">${h.n}</div><div style="font-size:11px;color:var(--graym)">${h.c} ${T.visits}</div><div class="pb" style="margin-top:5px"><div class="pf ${h.a>=80?'g':h.a>=60?'o':'r'}" style="width:${h.a}%"></div></div></div><div style="font-size:18px;font-weight:900;color:${h.a>=80?'var(--g)':h.a>=60?'var(--goldm)':'var(--r)'}">${h.a}%</div></div>`).join('');

window.renderSingle=()=>{

  el.innerHTML=`<div class="cd"><div class="ch">${name}</div><div class="sg"><div class="sk gn"><div class="sv">${v.length}</div><div class="sl">${T.visits}</div></div><div class="sk bl"><div class="sv">${avg}%</div><div class="sl">${T.sl3}</div></div></div><div style="font-size:13px;font-weight:700;margin-bottom:8px">${T.visitdates}</div>${v.map(x=>`<div style="display:flex;justify-content:space-between;padding:8px;background:var(--grayl);border-radius:6px;margin-bottom:4px;font-size:12px;cursor:pointer" onclick="showDet('${x.id}')"><span>${x.dateM||''} ${x.time||''} | ${x.supervisor}</span><span class="fw ${SC(x.score)}">${x.score}%</span></div>`).join('')}</div><div class="cd"><div class="ch">${T.problematic}</div>${pr.length?pr.map(it=>`<div class="pw"><div class="pl"><span>${it.id}. ${it.txt.slice(0,32)}...</span><span>${it.pct}%</span></div><div class="pb"><div class="pf r" style="width:${it.pct}%"></div></div></div>`).join(''):'<div class="es" style="padding:14px">'+T.noprob+'</div>'}</div>`;

window.addUser=async()=>{
  const n=$('nun').value.trim(),e=$('nem').value.trim(),p=$('npw').value.trim(),r=$('nrl').value;
  if(!n||!e||!p){alert(T.fillall);return;}
  if(p.length<6){alert(T.pass6);return;}
  try{const c=await createUserWithEmailAndPassword(auth,e,p);await setDoc(doc(db,'users',c.user.uid),{name:n,email:e,role:r,createdAt:serverTimestamp()});['nun','nem','npw'].forEach(id=>$(id).value='');alert(T.addok+' '+n);}
  catch(er){alert(T.adderr+er.message);}
};
window.delU=async id=>{
  if(!confirm(T.delconf))return;
  try{await deleteDoc(doc(db,'users',id));renderAdmin();}catch(e){alert(T.delerr+e.message);}
};
